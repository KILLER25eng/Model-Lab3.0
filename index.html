<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚拟模拟实验平台 Ultimate Pro - VirtualLab</title>
    <style>
        :root {
            --bg: #0a0f1a; --panel: #121b2d; --accent: #1a2a45; --highlight: #e94560;
            --text: #e0e0e0; --text2: #a0a0b0; --gold: #f0c060; --green: #4caf84;
            --blue: #4a90d9; --border: #2a3a55; --radius: 12px; --transition: 0.25s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }
        #topNav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 20px; background: var(--panel); border-bottom: 2px solid var(--border);
            height: 50px; gap: 10px;
        }
        #topNav .logo { font-size: 1.3em; font-weight: 700; color: var(--gold); }
        .nav-btns { display: flex; gap: 10px; align-items: center; }
        .nav-btns button {
            padding: 6px 16px; border: 1px solid var(--border); border-radius: 18px;
            background: var(--accent); color: #ccc; cursor: pointer; font-size: 0.85em; transition: 0.3s;
        }
        .nav-btns button:hover, .nav-btns button.active {
            background: var(--highlight); border-color: var(--highlight); color: #fff;
        }
        #userArea {
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            padding: 5px 12px; border-radius: 18px; border: 1px solid var(--border);
            background: #1a1a35; font-size: 0.85em;
        }
        #userAvatar { width: 28px; height: 28px; border-radius: 50%; background: var(--highlight); display: flex; align-items: center; justify-content: center; color:#fff; }
        #mainContainer { display: flex; height: calc(100vh - 50px); position: relative; }
        .page { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .page.active { display: flex; }
        #homePage {
            flex-direction: column; align-items: center; justify-content: center; gap: 30px;
            background: radial-gradient(ellipse at center, #15202d 0%, #0a0f1a 100%);
        }
        .home-title { font-size: 2.6em; font-weight: 700; color:#fff; }
        .home-subtitle { color: var(--text2); max-width: 600px; text-align: center; }
        .home-cards { display: flex; gap: 20px; }
        .home-card {
            width: 200px; height: 160px; background: var(--panel); border:2px solid var(--border);
            border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap:12px; cursor: pointer; transition: 0.3s;
        }
        .home-card:hover { border-color: var(--highlight); transform: translateY(-6px); background: #1e2b45; }
        .home-card .icon { font-size: 2.8em; }
        #experimentPage { flex-direction: row; }
        .left-panel, .right-panel { background: var(--panel); padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap:8px; }
        .left-panel { width: 280px; min-width: 280px; border-right: 2px solid var(--border); }
        .right-panel { width: 310px; min-width: 310px; border-left: 2px solid var(--border); }
        .center-panel { flex:1; display: flex; flex-direction: column; background: #0a0f1a; position: relative; }
        #labCanvas { flex:1; cursor: crosshair; border:2px solid #2a3a55; margin:8px; background: #0d1117; }
        .panel-title { font-weight: 700; color: var(--gold); padding: 8px 12px; background: #1a2540; border-radius:6px; cursor: pointer; display: flex; justify-content: space-between; }
        .panel-content { display: none; flex-direction: column; gap:5px; max-height:380px; overflow-y: auto; }
        .panel-content.show { display: flex; }
        .item-entry { display: flex; align-items: center; justify-content: space-between; padding:5px 8px; background:#1a2540; border-radius:6px; cursor: grab; font-size:0.75em; border:1px solid transparent; }
        .item-entry:hover { border-color: var(--blue); }
        .item-entry .item-name { flex:1; margin-left:4px; }
        .env-row { display: flex; align-items: center; gap:5px; font-size:0.78em; margin-bottom:3px; }
        .env-row label { min-width:80px; color:#aaa; }
        .env-row input, .env-row select { flex:1; padding:4px 8px; border-radius:4px; border:1px solid var(--border); background:#1a2540; color:#fff; }
        .btn-row { display: flex; gap:8px; padding:6px; flex-wrap: wrap; }
        .btn-primary { padding:8px 16px; background:var(--highlight); border:none; color:#fff; border-radius:18px; cursor:pointer; }
        .btn-stop { padding:8px 16px; background:#555; border:none; color:#fff; border-radius:18px; cursor:pointer; }
        .btn-replay { background: var(--blue); }
        .btn-reset { background: #c0392b; }
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:999; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background:#121b2d; border:2px solid #2a3a55; border-radius:16px; padding:20px; max-width:650px; width:90%; max-height:80vh; overflow-y: auto; color:#ddd; }
        .modal h3 { color: var(--gold); }
        .search-result-item { padding:10px; background:#1a2540; border-radius:8px; margin:6px 0; cursor:pointer; }
        .search-result-item:hover { background:#1f3050; }
        #langSelector { position: fixed; top:60px; right:20px; background:#121b2d; border:2px solid var(--border); border-radius:12px; padding:10px; z-index:200; display:none; max-height:350px; overflow-y:auto; width:200px; }
        #langSelector.show { display: block; }
        .lang-option { padding:7px 12px; cursor: pointer; border-radius:4px; }
        .lang-option:hover { background:var(--accent); }
        .toast { position:fixed; top:60px; left:50%; transform:translateX(-50%); background:#333; padding:8px 24px; border-radius:20px; z-index:300; opacity:0; transition:0.3s; pointer-events: none; }
        .toast.show { opacity:1; }
    </style>
</head>
<body>
    <div id="topNav">
        <span class="logo">🧪 VirtualLab Ultimate</span>
        <div class="nav-btns">
            <button id="btnHome" class="active">🏠 主页</button>
            <button id="btnExperiment">🔬 开始实验</button>
            <button id="btnLiterature">📚 文献搜索</button>
            <button id="btnLang">🌐 语言</button>
        </div>
        <div id="userArea">
            <div id="userAvatar">?</div>
            <span id="userNameDisplay">未登录</span>
        </div>
    </div>

    <div id="langSelector"></div>

    <div id="mainContainer">
        <!-- 主页 -->
        <div class="page active" id="homePage">
            <div class="home-title">🔬 虚拟模拟实验平台 Ultimate</div>
            <div class="home-subtitle">从微观粒子到宏观物体，全部拖拽至试验台，模拟真实物理化学现象。</div>
            <div class="home-cards">
                <div class="home-card" id="cardExperiment"><span class="icon">🔬</span><span class="label">开始实验</span></div>
                <div class="home-card" id="cardLiterature"><span class="icon">📚</span><span class="label">文献搜索</span></div>
                <div class="home-card" id="cardLang"><span class="icon">🌐</span><span class="label">语言区</span></div>
            </div>
        </div>

        <!-- 实验页 -->
        <div class="page" id="experimentPage">
            <div class="left-panel">
                <div class="panel-title expanded">🧰 仪器与药品 <span>▼</span></div>
                <div class="panel-content show">
                    <input type="text" id="searchItems" placeholder="搜索（名称、类型、化学式）...">
                    <div id="itemsList" style="max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;"></div>
                </div>
            </div>
            <div class="center-panel">
                <canvas id="labCanvas"></canvas>
                <div class="btn-row" style="justify-content:center;">
                    <button class="btn-primary" id="btnStart">▶ 开始实验</button>
                    <button class="btn-stop" id="btnStop">⏹ 终止</button>
                    <button class="btn-replay btn-primary" id="btnReplay">🔄 回放</button>
                    <button class="btn-reset btn-primary" id="btnReset">🗑️ 重置试验台</button>
                </div>
                <div id="speedControl" style="display:none;position:absolute;bottom:70px;right:20px;background:#121b2d;padding:6px 12px;border-radius:8px;">
                    <span>回放倍速:</span>
                    <select id="replaySpeed">
                        <option value="0.1">×0.1</option><option value="0.5">×0.5</option>
                        <option value="1.0" selected>×1.0</option><option value="2.0">×2.0</option><option value="3.0">×3.0</option>
                    </select>
                </div>
            </div>
            <div class="right-panel">
                <div class="panel-title expanded">🌡 环境参数调节 <span>▼</span></div>
                <div class="panel-content show">
                    <div style="font-weight:600;color:#f0c060;">🌍 室外条件</div>
                    <div class="env-row"><label>海拔(m)</label><input type="number" id="envAltitude" value="0"></div>
                    <div class="env-row"><label>重力(m/s²)</label><input type="number" id="envGravity" value="9.81"></div>
                    <div class="env-row"><label>气温(°C)</label><input type="number" id="envTemp" value="25"></div>
                    <div class="env-row"><label>气压(kPa)</label><input type="number" id="envPressure" value="101.325"></div>
                    <div class="env-row"><label>光照(lux)</label><input type="number" id="envLight" value="10000"></div>
                    <div class="env-row"><label>降雨量(mm/h)</label><input type="number" id="envRain" value="0"></div>
                    <div class="env-row"><label>土壤pH</label><input type="number" id="envSoilPH" value="7"></div>
                    <div class="env-row"><label>磁场方向(°)</label><input type="number" id="envMagDir" value="0"></div>
                    <div class="env-row"><label>磁场强度(T)</label><input type="number" id="envMagStr" value="0.00005"></div>
                    <div style="font-weight:600;color:#f0c060;margin-top:6px;">🏠 室内条件</div>
                    <div class="env-row"><label>地板硬度</label><select id="envFloorHard"><option value="medium">中等</option><option value="hard">坚硬</option><option value="soft">柔软</option></select></div>
                    <div class="env-row"><label>离地高度(m)</label><input type="number" id="envHeight" value="0"></div>
                    <div class="env-row"><label>人造光源(lux)</label><input type="number" id="envArtLight" value="500"></div>
                    <div class="env-row"><label>菌群条件</label><select id="envBacteria"><option value="sterile">无菌</option><option value="normal">正常</option></select></div>
                    <button class="btn-primary" id="btnSaveEnv" style="width:100%;margin-top:8px;">💾 保存环境参数</button>
                </div>
            </div>
        </div>

        <!-- 文献页 -->
        <div class="page" id="literaturePage">
            <div style="padding:20px;overflow-y:auto;height:100%;display:flex;flex-direction:column;gap:20px;">
                <div style="background:#121b2d;border-radius:12px;padding:20px;">
                    <h3 style="color:#f0c060;">📝 社区贡献</h3>
                    <button class="btn-primary" id="btnRecord">记录实验</button>
                    <button class="btn-replay btn-primary" id="btnQuery">查询记录</button>
                </div>
                <div style="background:#121b2d;border-radius:12px;padding:20px;">
                    <h3 style="color:#f0c060;">📖 原始资料库</h3>
                    <input type="text" id="searchOriginal" placeholder="搜索文献（名称、作者、学科...）" style="width:100%;padding:8px;border-radius:16px;border:1px solid #2a3a55;background:#1a2540;color:#fff;">
                    <div id="originalResults" style="margin-top:10px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 弹窗 -->
    <div class="modal-overlay" id="modalParam">
        <div class="modal"><h3>⚙️ 参数设置</h3><div id="paramFields"></div><div class="btn-row"><button class="btn-stop" id="btnParamCancel">取消</button><button class="btn-primary" id="btnParamSave">保存并拖拽</button></div></div>
    </div>
    <div class="modal-overlay" id="modalLiteratureDetail">
        <div class="modal"><h3 id="litDetailTitle"></h3><div id="litDetailContent"></div><button class="btn-stop" id="btnCloseLitDetail">关闭</button></div>
    </div>
    <div class="modal-overlay" id="modalUser"><div class="modal"><h3>用户中心</h3><input placeholder="邮箱/电话" id="loginContact"><input type="password" placeholder="密码" id="loginPassword"><button class="btn-primary" id="btnLogin">登录</button><button class="btn-primary" id="btnRegister">注册</button></div></div>
    <div class="modal-overlay" id="modalRecord"><div class="modal"><h3>记录实验</h3><input placeholder="名称" id="recName"><input placeholder="科目" id="recSubject"><textarea placeholder="操作与结果..."></textarea><button class="btn-primary" id="btnRecordStore">存储</button></div></div>
    <div class="toast" id="toast"></div>

    <script>
    (function() {
        // ---------- 全局状态 ----------
        let currentUser = null;
        let experimentRunning = false, replaying = false;
        let placedItems = [], particles = [], bubbles = [], replayData = [], replayFrame = 0, replaySpeed = 1.0;
        let waterRegion = null;
        let animationId = null, lastTime = 0;
        let currentLang = 'zh-CN';
        let envSettings = {
            altitude:0, gravity:9.81, temperature:25, pressure:101.325,
            light:10000, rain:0, soilPH:7, magDir:0, magStr:0.00005,
            floorHard:'medium', height:0, artLight:500, bacteria:'sterile'
        };
        let paramSettings = {};
        let draggedItem = null;

        const canvas = document.getElementById('labCanvas');
        const ctx = canvas?.getContext('2d');

        function resizeCanvas() {
            if (!canvas) return;
            const parent = canvas.parentElement;
            canvas.width = parent.clientWidth - 16;
            canvas.height = parent.clientHeight - 70;
        }
        if (canvas) { resizeCanvas(); window.addEventListener('resize', resizeCanvas); }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast show';
            setTimeout(() => t.className = 'toast', 2000);
        }

        // ---------- 多语言 (16种) ----------
        const translations = {
            'zh-CN': { home:'主页', startExperiment:'开始实验', literature:'文献搜索', language:'语言', reset:'重置试验台' },
            'en': { home:'Home', startExperiment:'Start', literature:'Literature', language:'Language', reset:'Reset' },
            'ja': { home:'ホーム', startExperiment:'開始', literature:'文献', language:'言語', reset:'リセット' },
            'fr': { home:'Accueil', startExperiment:'Démarrer', literature:'Littérature', language:'Langue', reset:'Réinitialiser' },
            'de': { home:'Start', startExperiment:'Experiment', literature:'Literatur', language:'Sprache', reset:'Zurücksetzen' },
            'ko': { home:'홈', startExperiment:'시작', literature:'문헌', language:'언어', reset:'초기화' },
            'es': { home:'Inicio', startExperiment:'Iniciar', literature:'Literatura', language:'Idioma', reset:'Restablecer' },
            'ru': { home:'Главная', startExperiment:'Старт', literature:'Литература', language:'Язык', reset:'Сброс' },
            'ar': { home:'الرئيسية', startExperiment:'بدء', literature:'الأدبيات', language:'اللغة', reset:'إعادة' },
            'hi': { home:'होम', startExperiment:'शुरू', literature:'साहित्य', language:'भाषा', reset:'रीसेट' },
            'it': { home:'Home', startExperiment:'Avvia', literature:'Letteratura', language:'Lingua', reset:'Ripristina' },
            'pt': { home:'Início', startExperiment:'Iniciar', literature:'Literatura', language:'Idioma', reset:'Redefinir' },
            'th': { home:'หน้าแรก', startExperiment:'เริ่ม', literature:'วรรณกรรม', language:'ภาษา', reset:'รีเซ็ต' },
            'vi': { home:'Trang chủ', startExperiment:'Bắt đầu', literature:'Văn học', language:'Ngôn ngữ', reset:'Đặt lại' },
            'tr': { home:'Ana Sayfa', startExperiment:'Başlat', literature:'Literatür', language:'Dil', reset:'Sıfırla' },
            'nl': { home:'Home', startExperiment:'Start', literature:'Literatuur', language:'Taal', reset:'Resetten' },
        };
        function t(key) {
            return (translations[currentLang] && translations[currentLang][key]) || translations['zh-CN'][key] || key;
        }
        function applyTranslations() {
            document.getElementById('btnHome').textContent = '🏠 ' + t('home');
            document.getElementById('btnExperiment').textContent = '🔬 ' + t('startExperiment');
            document.getElementById('btnLiterature').textContent = '📚 ' + t('literature');
            document.getElementById('btnLang').textContent = '🌐 ' + t('language');
            document.getElementById('btnReset').textContent = '🗑️ ' + t('reset');
        }

        // 语言选择器
        function buildLangSelector() {
            const ls = document.getElementById('langSelector');
            const langs = [
                { code:'zh-CN', name:'中文（简体）' }, { code:'en', name:'English' },
                { code:'ja', name:'日本語' }, { code:'fr', name:'Français' },
                { code:'de', name:'Deutsch' }, { code:'ko', name:'한국어' },
                { code:'es', name:'Español' }, { code:'ru', name:'Русский' },
                { code:'ar', name:'العربية' }, { code:'hi', name:'हिन्दी' },
                { code:'it', name:'Italiano' }, { code:'pt', name:'Português' },
                { code:'th', name:'ไทย' }, { code:'vi', name:'Tiếng Việt' },
                { code:'tr', name:'Türkçe' }, { code:'nl', name:'Nederlands' },
            ];
            ls.innerHTML = langs.map(l => `<div class="lang-option" data-lang="${l.code}">${l.name}</div>`).join('');
            ls.querySelectorAll('.lang-option').forEach(el => {
                el.addEventListener('click', () => {
                    currentLang = el.dataset.lang;
                    ls.classList.remove('show');
                    buildLangSelector();
                    applyTranslations();
                    showToast('✅ 语言切换: ' + el.textContent);
                });
            });
        }
        document.getElementById('btnLang').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('langSelector').classList.toggle('show');
        });
        document.addEventListener('click', (e) => {
            const ls = document.getElementById('langSelector');
            if (ls && !ls.contains(e.target)) ls.classList.remove('show');
        });
        buildLangSelector();
        applyTranslations();

        // ---------- 超大物品库 ----------
        const microParticles = [
            { id:'electron', name:'电子', icon:'⚡', category:'微观粒子', defaultParams:{charge:-1} },
            { id:'proton', name:'质子', icon:'🔴', category:'微观粒子', defaultParams:{charge:1} },
            { id:'neutron', name:'中子', icon:'⚪', category:'微观粒子', defaultParams:{charge:0} },
            { id:'photon', name:'光子', icon:'💡', category:'微观粒子', defaultParams:{energy_eV:2} },
        ];
        const elementSymbols = 'H He Li Be B C N O F Ne Na Mg Al Si P S Cl Ar K Ca Sc Ti V Cr Mn Fe Co Ni Cu Zn Ga Ge As Se Br Kr Rb Sr Y Zr Nb Mo Tc Ru Rh Pd Ag Cd In Sn Sb Te I Xe Cs Ba La Ce Pr Nd Pm Sm Eu Gd Tb Dy Ho Er Tm Yb Lu Hf Ta W Re Os Ir Pt Au Hg Tl Pb Bi Po At Rn Fr Ra Ac Th Pa U Np Pu Am Cm Bk Cf Es Fm Md No Lr Rf Db Sg Bh Hs Mt Ds Rg Cn Nh Fl Mc Lv Ts Og'.split(' ');
        const elementNames = '氢氦锂铍硼碳氮氧氟氖钠镁铝硅磷硫氯氩钾钙钪钛钒铬锰铁钴镍铜锌镓锗砷硒溴氪铷锶钇锆铌钼锝钌铑钯银镉铟锡锑碲碘氙铯钡镧铈镨钕钷钐铕钆铽镝钬铒铥镱镥铪钽钨铼锇铱铂金汞铊铅铋钋砹氡钫镭锕钍镤铀镎钚镅锔锫锎锿镄钔锘铹𬬻𬭊𬭳𬭶𫟼鿏𫟷𬬭鿔𬬻𬭊𬭳𬭶𫟼鿏𫟷𬬭鿔𬬻𬭊𬭳𬭶𫟼鿏𫟷𬬭'.split('');
        const elements = elementSymbols.map((sym, i) => ({
            id: 'elem_'+sym,
            name: `${elementNames[i]} (${sym})`,
            icon:'⚛️', category:'化学元素',
            defaultParams:{ mass_g:i*2+1 },
            elementData:{ symbol:sym, atomicNumber:i+1 }
        }));
        const compounds = [
            { id:'comp_H2O', name:'水 (H₂O)', icon:'💧', category:'化合物', defaultParams:{volume_ml:200} },
            { id:'comp_HCl', name:'盐酸 (HCl)', icon:'🧪', category:'化合物', defaultParams:{volume_ml:50} },
            { id:'comp_NaOH', name:'氢氧化钠 (NaOH)', icon:'🧂', category:'化合物', defaultParams:{mass_g:2} },
            { id:'comp_H2SO4', name:'硫酸 (H₂SO₄)', icon:'⚗️', category:'化合物', defaultParams:{volume_ml:30} },
        ];
        const instruments = [
            { id:'beaker', name:'烧杯', icon:'🧫', category:'仪器' },
            { id:'thermometer', name:'温度计', icon:'🌡️', category:'仪器' },
        ];
        const idealModels = [
            { id:'point_mass', name:'质点', icon:'⚫', category:'理想模型' },
            { id:'block', name:'小物块', icon:'🟫', category:'理想模型' },
        ];
        const macroObjects = [
            { id:'car', name:'轿车', icon:'🚗', category:'交通工具' },
            { id:'airplane', name:'喷气机', icon:'✈️', category:'交通工具' },
        ];
        const allItems = [...microParticles, ...elements, ...compounds, ...instruments, ...idealModels, ...macroObjects];

        function renderItems(filter='') {
            const list = document.getElementById('itemsList');
            const kw = filter.toLowerCase();
            const filtered = allItems.filter(item => item.name.toLowerCase().includes(kw) || item.id.includes(kw) || (item.category||'').includes(kw));
            const displayItems = filtered.slice(0, 200);
            list.innerHTML = displayItems.map(item => `
                <div class="item-entry" draggable="true" data-item-id="${item.id}">
                    <span>${item.icon||'📦'}</span>
                    <span class="item-name">${item.name}</span>
                    <button class="param-btn" data-id="${item.id}">⚙️</button>
                </div>
            `).join('');
            list.querySelectorAll('.item-entry').forEach(entry => {
                entry.addEventListener('dragstart', e => {
                    const id = entry.dataset.itemId;
                    const item = allItems.find(i => i.id === id);
                    draggedItem = item ? JSON.parse(JSON.stringify(item)) : null;
                    if (draggedItem && paramSettings[id]) draggedItem.defaultParams = paramSettings[id];
                });
                entry.querySelector('.param-btn')?.addEventListener('click', e => {
                    e.stopPropagation();
                    openParamModal(entry.dataset.itemId);
                });
            });
        }
        document.getElementById('searchItems').addEventListener('input', e => renderItems(e.target.value));
        renderItems();

        function openParamModal(itemId) {
            const item = allItems.find(i => i.id === itemId);
            if (!item) return;
            const modal = document.getElementById('modalParam');
            const fields = document.getElementById('paramFields');
            const params = paramSettings[itemId] || item.defaultParams || {};
            let html = '';
            for (let [key, val] of Object.entries(params)) {
                html += `<label>${key}</label><input type="${typeof val==='number'?'number':'text'}" value="${val}" data-key="${key}">`;
            }
            fields.innerHTML = html;
            modal._itemId = itemId;
            modal.classList.add('show');
        }
        document.getElementById('btnParamSave').addEventListener('click', () => {
            const modal = document.getElementById('modalParam');
            const inputs = document.querySelectorAll('#paramFields input');
            const params = {};
            inputs.forEach(inp => params[inp.dataset.key] = inp.type==='number' ? parseFloat(inp.value)||0 : inp.value);
            paramSettings[modal._itemId] = params;
            modal.classList.remove('show');
            showToast('参数已保存');
        });
        document.getElementById('btnParamCancel').addEventListener('click', () => document.getElementById('modalParam').classList.remove('show'));

        // ---------- 试验台拖放 ----------
        if (canvas) {
            canvas.addEventListener('dragover', e => e.preventDefault());
            canvas.addEventListener('drop', e => {
                e.preventDefault();
                if (!draggedItem) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left, y = e.clientY - rect.top;
                const params = draggedItem.defaultParams || {};
                const newItem = {
                    id: Date.now().toString(36)+Math.random().toString(36).substr(2,4),
                    typeId: draggedItem.id,
                    name: params._label || draggedItem.name,
                    category: draggedItem.category,
                    x, y,
                    params: {...params},
                    vx:0, vy:0,
                    mass: params.mass_kg || (params.mass_g||1)/1000 || 0.1,
                    size: 20,
                    state:'placed',
                    elementData: draggedItem.elementData,
                    compoundData: draggedItem.compoundData,
                    isSodium: draggedItem.elementData?.symbol === 'Na'
                };
                if (draggedItem.id === 'comp_H2O') {
                    newItem.isWater = true;
                    newItem.volume = params.volume_ml || 200;
                    newItem.size = Math.sqrt(newItem.volume)*5;
                    waterRegion = { x, y, w: newItem.size*2, h: newItem.size, volume: newItem.volume };
                }
                if (newItem.isSodium) {
                    newItem.mass = (params.mass_g||1)/1000;
                    newItem.size = Math.max(8, Math.cbrt(newItem.mass*1e6)*2);
                }
                placedItems.push(newItem);
                drawLab();
                showToast(`已放置: ${newItem.name}`);
                draggedItem = null;
            });
        }

        function drawLab() {
            if (!ctx) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            // 网格
            ctx.strokeStyle = '#1a2330'; ctx.lineWidth = 0.5;
            for (let x=0; x<canvas.width; x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
            for (let y=0; y<canvas.height; y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
            if (waterRegion) {
                ctx.fillStyle = 'rgba(50,120,200,0.5)';
                ctx.fillRect(waterRegion.x-waterRegion.w/2, waterRegion.y-waterRegion.h/2, waterRegion.w, waterRegion.h);
            }
            particles.forEach(p => {
                ctx.fillStyle = p.color || '#ffaa00';
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size||3, 0, Math.PI*2); ctx.fill();
            });
            bubbles.forEach(b => {
                ctx.strokeStyle = '#aaddff';
                ctx.beginPath(); ctx.arc(b.x, b.y, b.size||4, 0, Math.PI*2); ctx.stroke();
            });
            placedItems.forEach(item => {
                ctx.save();
                ctx.translate(item.x, item.y);
                if (item.isSodium) {
                    const r = item.size * Math.max(0.1, 1-(item.dissolved||0));
                    ctx.fillStyle = '#c0c0c0';
                    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
                } else if (item.typeId === 'thermometer') {
                    ctx.fillStyle = '#fff'; ctx.fillRect(-4,-25,8,50);
                    const temp = envSettings.temperature;
                    const h = Math.min(35, Math.max(5, (temp+10)*0.5));
                    ctx.fillStyle = '#ff3333'; ctx.fillRect(-3,20-h,6,h);
                } else {
                    ctx.fillStyle = '#8899aa';
                    ctx.beginPath(); ctx.arc(0,0,item.size||20,0,Math.PI*2); ctx.fill();
                }
                ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(item.name, 0, -(item.size||20)-6);
                ctx.restore();
            });
            ctx.fillStyle = '#aaa'; ctx.font = '10px monospace'; ctx.textAlign = 'left';
            ctx.fillText(`T:${envSettings.temperature.toFixed(1)}°C g:${envSettings.gravity} P:${envSettings.pressure}kPa`, 10, canvas.height-10);
        }

        // ---------- 物理化学模拟 ----------
        function updateSim(dt) {
            dt = Math.min(dt, 0.05);
            placedItems.forEach(item => {
                if (item.isSodium && item.state==='reacting' && waterRegion && (item.dissolved||0)<1) {
                    const waterTop = waterRegion.y - waterRegion.h/2;
                    item.y = waterTop - item.size*0.3;
                    const force = (1-(item.dissolved||0))*200;
                    item.vx += (Math.random()-0.5)*force*dt;
                    item.vy += (Math.random()-0.5)*force*0.6*dt;
                    item.vx *= 0.88; item.vy *= 0.88;
                    item.x += item.vx*dt*50;
                    if (item.x < waterRegion.x-waterRegion.w/2+10) item.vx *= -0.7;
                    if (item.x > waterRegion.x+waterRegion.w/2-10) item.vx *= -0.7;
                    item.dissolved = (item.dissolved||0) + dt*0.4;
                    if (item.dissolved > 1) item.dissolved = 1;
                    envSettings.temperature += dt * item.mass * 30;
                    if (Math.random() < 0.8) bubbles.push({x:item.x+Math.random()*10-5, y:item.y-8, size:3+Math.random()*6, vy:-40-Math.random()*40, life:1});
                    if (item.mass > 0.5 && Math.random() < 0.3) particles.push({x:item.x, y:item.y, size:2+Math.random()*4, vx:(Math.random()-0.5)*80, vy:-30-Math.random()*50, life:0.5, color:'#ff5500'});
                }
                // 酸碱中和
                if (item.compoundData?.formula==='HCl' || item.compoundData?.formula==='H2SO4') {
                    const bases = placedItems.filter(i => i.compoundData?.formula==='NaOH');
                    bases.forEach(b => {
                        const dist = Math.sqrt((item.x-b.x)**2 + (item.y-b.y)**2);
                        if (dist < 60) {
                            envSettings.temperature += dt * 10;
                            if (Math.random() < 0.2) particles.push({x:(item.x+b.x)/2, y:(item.y+b.y)/2, size:3, vx:0, vy:-10, life:0.4, color:'#fff'});
                        }
                    });
                }
            });
            particles.forEach(p => { p.x += (p.vx||0)*dt; p.y += (p.vy||0)*dt; p.life -= dt; });
            particles = particles.filter(p => p.life > 0);
            bubbles.forEach(b => { b.x += (b.vx||0)*dt; b.y += (b.vy||0)*dt; b.life -= dt; });
            bubbles = bubbles.filter(b => b.life > 0);
            if (!experimentRunning) envSettings.temperature += (25 - envSettings.temperature) * dt * 0.2;
        }

        function gameLoop(ts) {
            if (!lastTime) lastTime = ts;
            let dt = (ts - lastTime)/1000;
            if (dt<=0) dt = 0.016; if (dt>0.1) dt = 0.1;
            lastTime = ts;
            if (experimentRunning && !replaying) {
                updateSim(dt);
                drawLab();
            } else if (replaying && replayData.length) {
                replayFrame += dt * replaySpeed;
                const idx = Math.min(Math.floor(replayFrame*60), replayData.length-1);
                const frame = replayData[idx];
                if (frame) {
                    placedItems = frame.placedItems; particles = frame.particles; bubbles = frame.bubbles;
                    waterRegion = frame.waterRegion; envSettings.temperature = frame.temperature;
                    drawLab();
                }
                if (replayFrame*60 >= replayData.length) stopReplay();
            }
            animationId = requestAnimationFrame(gameLoop);
        }

        document.getElementById('btnStart').addEventListener('click', () => {
            if (experimentRunning) return;
            experimentRunning = true;
            replayData = [];
            placedItems.forEach(item => { if (item.isSodium && waterRegion) item.state = 'reacting'; });
            showToast('实验开始');
        });
        document.getElementById('btnStop').addEventListener('click', () => {
            experimentRunning = false;
            placedItems.forEach(i => { if (i.state==='reacting') i.state='paused'; });
            showToast('实验终止');
        });
        document.getElementById('btnReplay').addEventListener('click', () => {
            if (replaying) stopReplay();
            else {
                if (replayData.length === 0) { showToast('无回放数据'); return; }
                replaying = true; replayFrame = 0;
                replaySpeed = parseFloat(document.getElementById('replaySpeed').value);
                document.getElementById('speedControl').style.display = 'flex';
            }
        });
        function stopReplay() { replaying = false; document.getElementById('speedControl').style.display = 'none'; }

        // 重置试验台
        document.getElementById('btnReset').addEventListener('click', () => {
            placedItems = []; particles = []; bubbles = []; waterRegion = null;
            replayData = []; replayFrame = 0; experimentRunning = false; replaying = false;
            document.getElementById('speedControl').style.display = 'none';
            drawLab(); showToast('试验台已重置');
        });

        // 环境保存
        document.getElementById('btnSaveEnv').addEventListener('click', () => {
            envSettings.altitude = +document.getElementById('envAltitude').value || 0;
            envSettings.gravity = +document.getElementById('envGravity').value || 9.81;
            envSettings.temperature = +document.getElementById('envTemp').value || 25;
            envSettings.pressure = +document.getElementById('envPressure').value || 101.325;
            envSettings.light = +document.getElementById('envLight').value || 10000;
            envSettings.rain = +document.getElementById('envRain').value || 0;
            envSettings.soilPH = +document.getElementById('envSoilPH').value || 7;
            envSettings.magDir = +document.getElementById('envMagDir').value || 0;
            envSettings.magStr = +document.getElementById('envMagStr').value || 0.00005;
            envSettings.floorHard = document.getElementById('envFloorHard').value;
            envSettings.height = +document.getElementById('envHeight').value || 0;
            envSettings.artLight = +document.getElementById('envArtLight').value || 500;
            envSettings.bacteria = document.getElementById('envBacteria').value;
            showToast('环境参数已保存');
        });

        // ---------- 文献库 (长文本+链接) ----------
        const literatureDB = [
            {
                title: '自然哲学的数学原理',
                author: 'Isaac Newton',
                nation: '英国',
                subject: '物理学',
                year: 1687,
                text: '《自然哲学的数学原理》是牛顿的代表作，书中提出了万有引力定律和运动三大定律。牛顿在这部著作中阐述了绝对时空观，并运用数学方法解释了行星轨道、潮汐等现象。它是科学史上最具影响力的著作之一。',
                link: 'https://zh.wikipedia.org/wiki/%E8%87%AA%E7%84%B6%E5%93%B2%E5%AD%A6%E7%9A%84%E6%95%B0%E5%AD%A6%E5%8E%9F%E7%90%86'
            },
            {
                title: '物种起源',
                author: 'Charles Darwin',
                nation: '英国',
                subject: '生物学',
                year: 1859,
                text: '达尔文在《物种起源》中提出了自然选择学说，用大量事实论证了物种的可变性和共同祖先。该书不仅改变了生物学，也深刻影响了人类的思想。',
                link: 'https://zh.wikipedia.org/wiki/%E7%89%A9%E7%A7%8D%E8%B5%B7%E6%BA%90'
            },
            {
                title: '梦溪笔谈',
                author: '沈括',
                nation: '中国',
                subject: '综合科学',
                year: 1088,
                text: '《梦溪笔谈》是北宋沈括所著的百科全书式著作，涵盖天文、地理、物理、化学、生物等诸多领域。其中记录了活字印刷术、指南针等发明，被誉为“中国科学史上的坐标”。',
                link: 'https://zh.wikipedia.org/wiki/%E6%A2%A6%E6%BA%AA%E7%AD%86%E8%AB%87'
            },
        ];

        function loadOriginalResults(keyword='') {
            const container = document.getElementById('originalResults');
            const kw = keyword.toLowerCase();
            const filtered = literatureDB.filter(l => l.title.includes(kw) || l.author.includes(kw) || l.subject.includes(kw));
            container.innerHTML = filtered.map(l => `
                <div class="search-result-item" data-title="${l.title}">
                    <strong>${l.title}</strong> - ${l.author} (${l.nation}, ${l.year})
                    <span class="tag">${l.subject}</span>
                </div>
            `).join('');
            container.querySelectorAll('.search-result-item').forEach(el => {
                el.addEventListener('click', () => {
                    const lit = literatureDB.find(l => l.title === el.dataset.title);
                    if (lit) {
                        document.getElementById('litDetailTitle').textContent = lit.title;
                        document.getElementById('litDetailContent').innerHTML = `
                            <p><b>作者：</b>${lit.author} (${lit.nation})</p>
                            <p><b>年份：</b>${lit.year} | <b>学科：</b>${lit.subject}</p>
                            <p style="white-space:pre-wrap;">${lit.text}</p>
                            <p><a href="${lit.link}" target="_blank" style="color:#4a90d9;">📎 查询原文（维基百科/外部链接）</a></p>
                        `;
                        document.getElementById('modalLiteratureDetail').classList.add('show');
                    }
                });
            });
        }
        document.getElementById('searchOriginal').addEventListener('input', e => loadOriginalResults(e.target.value));
        document.getElementById('btnCloseLitDetail').addEventListener('click', () => document.getElementById('modalLiteratureDetail').classList.remove('show'));
        loadOriginalResults();

        // 页面切换
        function switchPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        document.getElementById('btnHome').addEventListener('click', () => switchPage('homePage'));
        document.getElementById('btnExperiment').addEventListener('click', () => switchPage('experimentPage'));
        document.getElementById('btnLiterature').addEventListener('click', () => switchPage('literaturePage'));
        document.getElementById('cardExperiment').addEventListener('click', () => switchPage('experimentPage'));
        document.getElementById('cardLiterature').addEventListener('click', () => switchPage('literaturePage'));
        document.getElementById('cardLang').addEventListener('click', () => document.getElementById('langSelector').classList.toggle('show'));

        // 用户
        document.getElementById('btnLogin').addEventListener('click', () => {
            currentUser = { name:'Researcher' };
            document.getElementById('userNameDisplay').textContent = 'Researcher';
            document.getElementById('modalUser').classList.remove('show');
        });
        document.getElementById('userArea').addEventListener('click', () => document.getElementById('modalUser').classList.add('show'));

        // 启动
        resizeCanvas();
        drawLab();
        lastTime = performance.now();
        animationId = requestAnimationFrame(gameLoop);
    })();
    </script>
</body>
</html>
